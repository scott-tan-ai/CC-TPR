# Runner operating system
runs-on: windows-latest

# Trigger on push to main and all PR branches
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Run tests on every push/PR
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: .venv\Scripts\python.exe -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=src --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # Type check on every push/PR
  typecheck:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: .venv\Scripts\python.exe -m pip install -e ".[dev]"

      - name: Run pyright
        run: pyright

  # Lint on every push/PR
  lint:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: .venv\Scripts\python.exe -m pip install -e ".[dev]"

      - name: Run ruff check
        run: ruff check src tests

      - name: Run ruff format check
        run: ruff format --check src tests

  # Build package on tag push
  build:
    runs-on: windows-latest
    needs: [test, typecheck, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: .venv\Scripts\python.exe -m pip install -e ".[dev]"

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          PYPI_USERNAME: __token__
          PYPI_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          .venv\Scripts\python.exe -m pip install twine
          twine upload dist/* --username ${{ env.PYPI_USERNAME }} --password ${{ env.PYPI_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
