name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: .venv\Scripts\python.exe -m pip install -e ".[dev]"

      - name: Run tests
        run: .venv\Scripts\python.exe -m pytest --cov=src --cov-report xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  typecheck:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: .venv\Scripts\python.exe -m pip install -e ".[dev]"

      - name: Run pyright
        env:
          PYTHONPATH: ${{ github.workspace }}\.venv\Lib\site-packages
        run: .venv\Scripts\pyright

  lint:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: .venv\Scripts\python.exe -m pip install -e ".[dev]"

      - name: Run ruff check
        run: .venv\Scripts\python.exe -m ruff check src tests

      - name: Run ruff format check
        run: .venv\Scripts\python.exe -m ruff format --check src tests

  